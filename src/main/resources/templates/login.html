<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bank Login</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #error { color: #e74c3c; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2 id="formTitle">Bank Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button class="btn" id="mainBtn" onclick="handleAuth()">Login</button>

    <p style="font-size: 0.8rem; margin-top:15px;">
        <a href="#" id="toggleLink" onclick="toggleForm()">New here? Create Account</a>
    </p>
    <p id="message"></p>
</div>

<script>
    let isLoginMode = true;

    function toggleForm() {
        isLoginMode = !isLoginMode;
        document.getElementById('formTitle').innerText = isLoginMode ? "Bank Login" : "Create Account";
        document.getElementById('mainBtn').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('toggleLink').innerText = isLoginMode ? "New here? Create Account" : "Back to Login";
    }

    async function handleAuth() {
        const path = isLoginMode ? '/bank/login' : '/bank/register';
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        const response = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            if (isLoginMode) {
                localStorage.setItem("isLoggedIn", "true"); // Simple "Session"
                window.location.href = "/ui/dashboard";
            } else {
                alert("Account created! Please login.");
                toggleForm();
            }
        } else {
            document.getElementById('message').innerText = "Auth Failed!";
        }
    }
</script>
</body>
</html>
