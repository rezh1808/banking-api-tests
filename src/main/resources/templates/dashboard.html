<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reza's Bank Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .balance-label { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 5px; }
        .balance-amount { color: #2ecc71; font-size: 2.5rem; font-weight: bold; margin: 0; }
        .btn { margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
<div class="container">
    <h2>Hello, Reza!</h2>
    <div class="balance-label">Current Balance</div>
    <p class="balance-amount">$<span th:text="${balance}">0.00</span></p>
    <button class="btn" onclick="location.reload()">Refresh Balance</button>
</div>
</body>
</html>
