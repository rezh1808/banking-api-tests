<!DOCTYPE html>
<html lang = xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reza's Bank Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .balance-label { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 5px; }
        .balance-amount { color: #2ecc71; font-size: 2.5rem; font-weight: bold; margin: 0; }
        .btn { margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: left; border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px;">
        <h2 id="displayUsername">Loading...</h2>
        <p style="color: #666; font-size: 0.8rem;">Account: <span id="displayAccount">---</span></p>
    </div>

    <div class="balance-label">Available Balance</div>
    <p class="balance-amount">$<span id="balanceDisplay">...</span></p>

    <hr>

    <h2>Quick Transfer</h2>
    <label for="transferAmount" style="display: block; margin-bottom: 5px; font-weight: bold;">
        Amount to Transfer:
    </label>
    <input type="number" id="transferAmount" name="transferAmount" placeholder="e.g. 100" style="padding: 8px; width: 80%;">
    <button class="btn" onclick="sendMoney()">Send Money</button>
    <button class="btn" style="background:#e74c3c" onclick="logout()">Logout</button>
    <p id="statusMessage" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<script>
    async function sendMoney() {
        const token = localStorage.getItem("sessionToken");

        // 1. Get the ELEMENTS (Objects), not just the values
        const amountInput = document.getElementById('transferAmount');
        const balanceSpan = document.getElementById('balanceDisplay');
        const status = document.getElementById('statusMessage');

        // 2. Get the value only when you're ready to send it
        const amountValue = amountInput.value;

        const response = await fetch('/bank/transfer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            },
            body: JSON.stringify({ amount: amountValue })
        });

        if (response.ok) {
            /** @type {{newBalance: number}} */
            const data = await response.json();
            balanceSpan.innerText = `${data.newBalance}`;
            status.innerText = "Transfer Successful! -$" + amountValue;
            status.style.color = "green";
            amountInput.value = "";
        } else {
            const errorData = await response.json();
            status.innerText = errorData.message || "Transfer Failed";
            status.style.color = "red";
        }
    }

    // Security Check: If not logged in, send back to login
    if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "/ui/login";
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        window.location.href = "/ui/login";
    }

    async function loadDashboard() {
        const token = localStorage.getItem("sessionToken");

        const response = await fetch('/bank/user-info', {
            headers: {'Authorization': token}
        });

        if (response.ok) {
            /** @type {{username: string, accountNumber: string, balance: number}} */
            const user = await response.json();
            console.log("Data from server:", user);
            document.getElementById('displayUsername').innerText = "Welcome, " + user.username;
            document.getElementById('displayAccount').innerText = user.accountNumber;
            document.getElementById('balanceDisplay').innerText = user.balance;
        } else {
            // If token is wrong or missing, go back to login
            console.error("Failed to load user info");
            window.location.href = "/ui/login";
             }
    }
    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
