<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NyuboBank | Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .input-group { position: relative; width: 100%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #27ae60; outline: none; }
        .toggle-eye { position: absolute; right: 10px; top: 18px; cursor: pointer; color: #7f8c8d; }
        .btn { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        .btn:disabled { background: #95a5a6; cursor: not-allowed; }
        #message { font-size: 0.85rem; margin-top: 15px; min-height: 1.5rem; font-weight: 600; }
        .hidden { display: none; }
        a { color: #2980b9; text-decoration: none; cursor: pointer; font-size: 0.85rem; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Reset Password</h2>

    <div id="step1">
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">Enter your email to receive a reset code.</p>
        <label for="resetEmail"></label>
        <input type="email" id="resetEmail" placeholder="Email Address">
        <button class="btn" id="sendOtpBtn" onclick="handleSendOtp()">Send OTP</button>
    </div>

    <div id="step2" class="hidden">
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">Check your Mailtrap inbox for the code.</p>
        <label for="otpCode"></label>
        <input type="text" id="otpCode" placeholder="6-Digit OTP" maxlength="6">

        <div class="input-group">
            <label for="newPassword"></label>
            <input type="password" id="newPassword" placeholder="New Password">
            <span id="toggleNew" class="toggle-eye" onclick="setupPasswordToggle('newPassword', 'toggleNew')">👁️</span>
        </div>

        <button class="btn" id="resetBtn" onclick="handleResetPassword()">Update Password</button>
    </div>

    <p id="message"></p>
    <a href="/ui/login">Return to Login</a>
</div>

<script>
    // Utility for Password Toggle
    function setupPasswordToggle(inputId, toggleId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(toggleId);
        if (passwordInput) {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            toggleIcon.textContent = type === 'password' ? '👁️' : '🙈';
        }
    }

    // Real-time Strength Check
    document.getElementById('newPassword').addEventListener('input', function() {
        const regex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
        const msg = document.getElementById('message');
        if (regex.test(this.value)) {
            msg.innerText = "Password strength: Strong ✅";
            msg.style.color = "#27ae60";
        } else {
            msg.innerText = "Need: 8+ chars, 1 Uppercase, 1 Number";
            msg.style.color = "#f39c12";
        }
    });

    // Part 1: Requesting the OTP
    async function handleSendOtp() {
        const email = document.getElementById('resetEmail').value;
        const btn = document.getElementById('sendOtpBtn');
        const msg = document.getElementById('message');

        if (!email) {
            msg.innerText = "Email is required";
            msg.style.color = "red";
            return;
        }
        if (btn.disabled) return;
        btn.disabled = true;
        btn.innerText = "Sending...";
        btn.style.opacity = "0.7";
        btn.style.cursor = "not-allowed";

        try {
            const response = await fetch(`/bank/forgot-password?email=${email}`, { method: 'POST' });
            if (response.ok) {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                msg.innerText = "OTP sent successfully!";
                msg.style.color = "#27ae60";
            } else {
                msg.innerText = "Email not found in our records.";
                msg.style.color = "red";
            }
        } catch (err) {
            msg.innerText = "Server error. Try again later.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Send OTP";
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        }
    }

    // Part 2: Updating the Password
    async function handleResetPassword() {
        const email = document.getElementById('resetEmail').value; // Still exists in hidden Step 1!
        const otp = document.getElementById('otpCode').value;
        const newPassword = document.getElementById('newPassword').value;
        const btn = document.getElementById('resetBtn');
        const msg = document.getElementById('message');

        if (btn.disabled) return;
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "Updating...";
        btn.style.opacity = "0.7";
        btn.style.cursor = "not-allowed";

        // Regex Check
        const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
        if (!passwordRegex.test(newPassword)) {
            msg.innerText = "Password does not meet requirements.";
            msg.style.color = "red";
            return;
        }

        try {
            const response = await fetch('/bank/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp, newPassword })
            });

            if (response.ok) {
                msg.innerText = "Password changed! Redirecting...";
                msg.style.color = "#27ae60";
                setTimeout(() => window.location.href = "/ui/login", 2000);
            } else {
                const errorDetail = await response.text();
                msg.innerText = errorDetail || "Invalid OTP. Please check your email.";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = originalText;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
            }
        } catch (err) {
            msg.innerText = "Connection error.";
            btn.disabled = false;
            btn.innerText = originalText;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        }
    }
</script>

</body>
</html>
