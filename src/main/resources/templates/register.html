<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval';">
    <meta charset="UTF-8">
    <title>NyuboBank | Register</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .links { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Create Account</h2>
    <input type="text" id="regUsername" placeholder="Username" aria-label="Username">
    <small style="color: #888; display: block; text-align: left; margin: -5px 0 10px 5px; font-size: 0.75rem;">
        * Lowercase & numbers only (e.g., yourname123)
    </small>
    <input type="email" id="regEmail" placeholder="Email Address" aria-label="Email Address">
    <div class="input-group" style="position: relative;">
        <label for="password"></label>
        <input type="password" id="password" placeholder="Create Password">
        <span id="togglePass" style="position: absolute; right: 10px; top: 12px; cursor: pointer;">👁️</span>
    </div>
    <small style="color: #888; display: block; text-align: left; margin: -5px 0 15px 5px; font-size: 0.75rem;">
        * Min 8 chars, 1 uppercase, 1 number
    </small>
    <button type="button" id="btnRegister">Sign Up</button>

    <div class="links">
        Already have an account? <a href="/ui/login.html">Login here</a>
    </div>
    <p id="errorMsg" style="color: red; text-align: center; font-size: 0.8rem;"></p>
</div>

<script>
    {
        function setupPasswordToggle(inputId, toggleId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(toggleId);

            // Safety check: Only add the listener if both elements actually exist on this page
            if (passwordInput && toggleIcon) {
                toggleIcon.addEventListener('click', () => {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    toggleIcon.textContent = type === 'password' ? '👁️' : '🙈';
                });
                console.log(`Toggle initialized for: ${inputId}`);
            } else {
                console.warn(`Could not find elements: ${inputId} or ${toggleId}`);
            }
        }

        const usernameRegex = /^(?=.*\d)[a-z0-9]{4,8}$/; // Lowercase and numbers only, no spaces
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/; // 8+ chars, 1 Uppercase, 1 Number

        async function handleRegister(event) {
            if (event) event.preventDefault();

            // 1. Grab elements and define "Original State" first
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageElem = document.getElementById('message');
            const registerBtn = document.getElementById('btnRegister');


            if (registerBtn.disabled) return;

            // Lock the button
            const originalText = registerBtn.innerText;
            registerBtn.disabled = true;
            registerBtn.innerText = "Creating Account...";
            registerBtn.style.opacity = "0.7";
            registerBtn.style.cursor = "not-allowed";

            // 2. Early Empty Check
            if (!username || !email || !password) {
                messageElem.innerText = "Please fill in all fields.";
                messageElem.style.color = "#e74c3c";
                return;
            }

            // 3. Username Validation
            if (!usernameRegex.test(username)) {
                messageElem.innerText = "Username: 4-8 chars, must have letters and numbers!";
                messageElem.style.color = "red";
                return;
            }

            // 4. Email Validation
            if (!emailRegex.test(email)) {
                messageElem.innerText = "Please enter a valid email address (must include @).";
                messageElem.style.color = "red";
                return;
            }

            // 5. Password Validation
            if (!passwordRegex.test(password)) {
                messageElem.innerText = "Password: 8+ chars, 1 Uppercase, 1 Number!";
                messageElem.style.color = "red";
                return;
            }

            // 6. Enter "Processing" state (Pull signal LOW)
            registerBtn.disabled = true;
            registerBtn.innerText = "Processing...";
            registerBtn.style.opacity = "0.7";
            registerBtn.style.cursor = "not-allowed";

            try {
                const response = await fetch('/bank/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (response.ok) {
                    // Success: Move to verification
                    window.location.href = `/ui/verify?user=${username}`;
                } else if (response.status === 409) {
                    messageElem.innerText = await response.text();
                    messageElem.style.color = "red";
                    registerBtn.disabled = false;
                    registerBtn.innerText = originalText;
                    registerBtn.style.opacity = "1";
                    registerBtn.style.cursor = "pointer";
                } else {
                    messageElem.innerText = "An error occurred. Please try again.";
                    messageElem.style.color = "red";
                    registerBtn.disabled = false;
                    registerBtn.innerText = originalText;
                    registerBtn.style.opacity = "1";
                    registerBtn.style.cursor = "pointer";
                }
            } catch (err) {
                messageElem.innerText = "Server error. Please try again later.";
                messageElem.style.color = "#e74c3c";
                registerBtn.disabled = false;
                registerBtn.innerText = originalText;
                registerBtn.style.opacity = "1";
                registerBtn.style.cursor = "pointer";
            } finally {
                // 6. THE FAILSAFE (Always return signal to HIGH)
                registerBtn.disabled = false;
                registerBtn.innerText = originalText;
                registerBtn.style.opacity = "1";
                registerBtn.style.cursor = "pointer";
            }
        }
        // This links the button to the logic without using deprecated 'onclick'
        document.getElementById('btnRegister').addEventListener('click', handleRegister);

        document.addEventListener('DOMContentLoaded', () => {
            setupPasswordToggle('password', 'togglePass');
        });
    }
</script>
</body>
</html>
